services:
  mariadb:
    image: mariadb:11.4
    environment:
      TZ: UTC
      MARIADB_DATABASE: latenttone
      MARIADB_USER: latenttone
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?set MARIADB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?set MARIADB_ROOT_PASSWORD in .env}
    volumes:
      - ${MARIADB_DATA:-./data/mariadb}:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  browse:
    build: .
    image: latenttone:dev
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${BROWSE_PORT:-8080}:8080"
    environment:
      TZ: UTC
      # Canonical HTTPS origin behind reverse proxy (MediaSession artwork, absolute links).
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://latent.lt.lkeng.org/}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DATABASE_DSN: latenttone:${MARIADB_PASSWORD}@tcp(mariadb:3306)/latenttone?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci
    volumes:
      # Test/dev library — READ ONLY (required)
      - ${MUSIC_LIBRARY:-/mnt2/media/music}:/music:ro
      - ${DATA_DIR:-./data}:/data
      - ./configs/scanner.yaml:/config/scanner.yaml:ro
      - ./configs/metadata.yaml:/config/metadata.yaml:ro
    command:
      - "serve"
      - "--config=/config/scanner.yaml"
      - "--meta=/config/metadata.yaml"
    restart: unless-stopped

  browse-stream:
    profiles: ["stream-smoke"]
    build: .
    image: latenttone:dev
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${BROWSE_PORT:-8080}:8080"
    environment:
      TZ: UTC
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://latent.lt.lkeng.org/}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DATABASE_DSN: latenttone:${MARIADB_PASSWORD}@tcp(mariadb:3306)/latenttone?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci
    volumes:
      - ${MUSIC_LIBRARY:-/mnt2/media/music}:/music:ro
      - ${DATA_DIR:-./data}:/data
      # stream-smoke overlay: enable_stream_probe + enable_api_docs
      - ./configs/scanner-stream-smoke.yaml:/config/scanner.yaml:ro
      - ./configs/metadata.yaml:/config/metadata.yaml:ro
    command:
      - "serve"
      - "--config=/config/scanner.yaml"
      - "--meta=/config/metadata.yaml"
    restart: "no"

  scan:
    profiles: ["scan"]
    build: .
    image: latenttone:dev
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      TZ: UTC
      DATABASE_DSN: latenttone:${MARIADB_PASSWORD}@tcp(mariadb:3306)/latenttone?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci
    volumes:
      - ${MUSIC_LIBRARY:-/mnt2/media/music}:/music:ro
      - ${DATA_DIR:-./data}:/data
      - ./configs/scanner.yaml:/config/scanner.yaml:ro
    command: ["scan", "--config", "/config/scanner.yaml"]

  embed:
    profiles: ["embed"]
    build: .
    image: latenttone:dev
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      TZ: UTC
      DATABASE_DSN: latenttone:${MARIADB_PASSWORD}@tcp(mariadb:3306)/latenttone?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci
    volumes:
      - ${MUSIC_LIBRARY:-/mnt2/media/music}:/music:ro
      - ${DATA_DIR:-./data}:/data
      - ./configs/metadata.yaml:/config/metadata.yaml:ro
      - ./configs/scanner.yaml:/config/scanner.yaml:ro
    command: ["embed", "--meta", "/config/metadata.yaml"]

  embed-ml:
    profiles: ["embed-ml"]
    build: .
    image: latenttone:dev
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      TZ: UTC
      DATABASE_DSN: latenttone:${MARIADB_PASSWORD}@tcp(mariadb:3306)/latenttone?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci
    volumes:
      - ${MUSIC_LIBRARY:-/mnt2/media/music}:/music:ro
      - ${DATA_DIR:-./data}:/data
      - ./configs/metadata-ml.yaml:/config/metadata.yaml:ro
      - ./configs/essentia_profile.yaml:/config/essentia_profile.yaml:ro
    command: ["embed", "--meta", "/config/metadata.yaml"]
