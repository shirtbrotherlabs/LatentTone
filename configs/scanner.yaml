# LatentTone library scanner configuration
library_root: /music
# MariaDB DSN (github.com/go-sql-driver/mysql format). Overridden by
# DATABASE_DSN / LATENTTONE_DATABASE_DSN env (see docker-compose.yml).
database_dsn: "latenttone:latenttone@tcp(mariadb:3306)/latenttone?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci"

# Audio file extensions (lowercase, without dot)
extensions:
  - flac
  - mp3
  - m4a
  - aac
  - ogg
  - opus
  - wav
  - aiff

# Glob patterns relative to library_root (empty = include all)
include: []
exclude:
  - "**/.Trash/**"
  - "**/@eaDir/**"

concurrency: 4

# Preferred cover art filenames (first match wins), searched in album directory
cover_names:
  - cover.jpg
  - cover.jpeg
  - cover.png
  - folder.jpg
  - folder.jpeg
  - folder.png
  - front.jpg
  - Front.jpg
  - AlbumArt.jpg
  - albumart.jpg

# When no sidecar cover file (above) is found, embedded art (ID3v2 APIC / FLAC
# PICTURE) is extracted from a track and cached here. The library is mounted
# read-only, so extracted covers live in this writable dir; the /covers/ handler
# falls back to it automatically. Paths mirror the album's library-relative dir.
cover_cache_dir: /data/covers

# Bootstrap for scan_schedule on first serve (DB row wins after seed).
# 24h product default; set 0s to seed schedule disabled (e.g. CI / stream-smoke).
# Admins change the live schedule in Settings → Library scan (PATCH /api/scan/schedule).
scan_interval: 24h

# HTTP listen address for browse UI
listen_addr: ":8080"

# Canonical public origin for reverse-proxy deployments (MediaSession artwork,
# absolute links). Overridden by PUBLIC_BASE_URL / LATENTTONE_PUBLIC_URL.
# No trailing slash required; empty defaults to https://latent.lt.lkeng.org
public_base_url: https://latent.lt.lkeng.org

# Phase 3 — auth & streaming (ADR-005 / ADR-006)
auth_mode: authenticated          # authenticated | open (solo-dev escape hatch)
session_ttl: 168h
# secure_cookie: omit to infer from public_base_url (https → Secure cookies).
# Override with secure_cookie: false for plain-HTTP local, or SECURE_COOKIE /
# LATENTTONE_SECURE_COOKIE env (true/false).
enable_stream_probe: false        # Gate C1: /dev/stream (debug only; product SPA is /app/)
enable_api_docs: false            # Phase 3B: /api/docs Swagger UI
hls_root: /data/hls
hls_ttl: 2h
max_concurrent_sessions: 64
max_sessions_per_user: 16
session_idle_ttl: 45m
queue_prefetch: 12
ffmpeg_path: ffmpeg
spa_root: /usr/share/latenttone/app   # Phase 4 product SPA (empty/missing = SPA disabled)
