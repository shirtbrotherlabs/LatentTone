# LatentTone library scanner — stream-smoke / Gate C probe overlay
# Compose: docker compose --profile stream-smoke up -d --build browse-stream
# Then open http://localhost:${BROWSE_PORT:-8080}/dev/stream
# API docs: http://localhost:${BROWSE_PORT:-8080}/api/docs/ (enable_api_docs: true)
library_root: /music
database_dsn: "latenttone:latenttone@tcp(mariadb:3306)/latenttone?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci"

extensions:
  - flac
  - mp3
  - m4a
  - aac
  - ogg
  - opus
  - wav
  - aiff

include: []
exclude:
  - "**/.Trash/**"
  - "**/@eaDir/**"

concurrency: 4
cover_names:
  - cover.jpg
  - cover.jpeg
  - cover.png
  - folder.jpg

# Seed scan_schedule disabled; also disable startup scan via Compose env.
scan_interval: 0s
listen_addr: ":8080"

auth_mode: authenticated
session_ttl: 24h
# Omit secure_cookie — inferred from public_base_url (https → Secure).
enable_stream_probe: true
enable_api_docs: true
hls_root: /data/hls
hls_ttl: 1h
max_concurrent_sessions: 4
queue_prefetch: 12
ffmpeg_path: ffmpeg
